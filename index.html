<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGTeam Mail - Sakura Elegance</title>
    
    <!-- Google Fonts: Poppins (Modern, Clean, Round) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        sakura: {
                            50: '#fff0f3',
                            100: '#ffe4e8',
                            200: '#fecdd6',
                            300: '#fea3b6',
                            400: '#fd6f8e',
                            500: '#f63d68',
                            600: '#e11d4d',
                        }
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(254, 163, 182, 0.3)',
                        'inner-soft': 'inset 0 2px 4px 0 rgba(254, 163, 182, 0.1)',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #fffafb;
            background-image: 
                radial-gradient(at 0% 0%, rgba(254, 205, 214, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(255, 240, 243, 0.8) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(254, 163, 182, 0.3) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(255, 255, 255, 0.8) 0px, transparent 50%);
            background-attachment: fixed;
            color: #334155;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Smooth Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #fecdd6; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #fea3b6; }

        /* Sakura Petals Animation */
        #sakura-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1; overflow: hidden;
        }
        .petal {
            position: absolute;
            background: linear-gradient(135deg, #ffffff 0%, #fea3b6 100%);
            border-radius: 15px 0 15px 0;
            opacity: 0.6;
            box-shadow: 0 2px 4px rgba(254, 163, 182, 0.3);
            animation: fall linear infinite, sway 2s ease-in-out infinite alternate;
        }
        @keyframes fall {
            0% { top: -10%; transform: rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { top: 110%; transform: rotate(360deg); opacity: 0; }
        }
        @keyframes sway {
            0% { margin-left: 0px; }
            100% { margin-left: 50px; }
        }

        /* Glass Cards */
        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: var(--tw-shadow-soft);
            border-radius: 1.5rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Inputs & Buttons */
        .input-soft {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #fecdd6;
            transition: all 0.3s ease;
        }
        .input-soft:focus {
            outline: none;
            border-color: #fd6f8e;
            box-shadow: 0 0 0 4px rgba(254, 163, 182, 0.2);
            background: #ffffff;
        }

        .btn-primary {
            background: linear-gradient(135deg, #fd6f8e 0%, #f63d68 100%);
            color: white;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(246, 61, 104, 0.3);
        }
        .btn-primary:active { transform: translateY(0); }

        .btn-secondary {
            background: white;
            color: #64748b;
            border: 1px solid #fecdd6;
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            color: #f63d68;
            border-color: #fea3b6;
            background: #fff0f3;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(254, 163, 182, 0.2);
        }

        /* Iframe */
        #email-body-frame {
            width: 100%; height: 100%; min-height: 450px; border: none;
            background-color: #ffffff;
            border-radius: 1rem;
        }

        /* Status Indicator */
        .status-ping { position: relative; display: flex; height: 10px; width: 10px; }
        .status-ping span:first-child {
            position: absolute; display: inline-flex; height: 100%; width: 100%;
            border-radius: 9999px; background-color: #fea3b6; opacity: 0.75;
            animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
        .status-ping span:last-child {
            position: relative; display: inline-flex; height: 10px; width: 10px;
            border-radius: 9999px; background-color: #f63d68;
        }

        .spinner {
            width: 14px; height: 14px;
            border: 2px solid rgba(246, 61, 104, 0.2);
            border-top-color: #f63d68;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* List Item Hover & Active */
        .inbox-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 4px solid transparent;
        }
        .inbox-item:hover {
            background: #fff0f3;
            transform: translateX(4px);
            border-left-color: #fea3b6;
        }
        .inbox-item.active {
            background: #ffe4e8;
            border-left-color: #f63d68;
            box-shadow: 0 4px 10px rgba(254, 163, 182, 0.15);
        }

        /* Toast */
        .toast-popup {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(254, 163, 182, 0.4);
            box-shadow: 0 15px 40px rgba(246, 61, 104, 0.15);
        }
    </style>
</head>
<body class="antialiased">

    <!-- Sakura Particle Background -->
    <div id="sakura-container"></div>

    <div class="container mx-auto px-4 py-8 max-w-6xl relative z-10">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 glass-card p-5 px-8">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-sakura-300 to-sakura-500 flex items-center justify-center shadow-lg shadow-sakura-400/30 text-white transform rotate-3 hover:rotate-0 transition-transform duration-300">
                    <i class="fa-solid fa-seedling text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-slate-800 tracking-tight flex items-center gap-2">
                        GGTeam <span class="text-sakura-500 font-light">Mail</span>
                    </h1>
                    <p class="text-xs text-slate-500 font-medium tracking-wide uppercase mt-0.5"><i class="fa-solid fa-leaf text-sakura-300 mr-1"></i> Temp Email Services</p>
                </div>
            </div>
            
            <div class="hidden md:flex items-center gap-2 bg-white/60 px-4 py-2 rounded-full border border-sakura-100 shadow-sm">
                <div id="standby-indicator" class="status-ping mr-2"><span></span><span></span></div>
                <div id="sync-icon" class="spinner mr-2 hidden"></div>
                <span id="status-text" class="text-xs font-semibold text-slate-600">Terhubung</span>
            </div>
        </header>

        <!-- Control Panel -->
        <div class="glass-card p-6 md:p-8 mb-8">
            <div class="flex flex-col lg:flex-row gap-8">
                
                <!-- Display Current Email -->
                <div class="flex-1">
                    <label class="block text-sm font-semibold text-slate-600 mb-2 pl-1">Alamat Email Sementara Anda</label>
                    <div class="flex relative shadow-sm rounded-2xl group">
                        <input type="text" id="current-email" readonly value="Menyiapkan sistem..." 
                               class="w-full input-soft rounded-l-2xl p-4 text-slate-800 font-medium text-lg pr-28">
                        <button onclick="copyEmail()" class="absolute right-2 top-2 bottom-2 btn-primary px-6 rounded-xl font-semibold text-sm flex items-center gap-2">
                            <i class="fa-regular fa-copy"></i> Salin
                        </button>
                    </div>
                </div>

                <!-- Custom Email Generator -->
                <div class="flex-1 border-t lg:border-t-0 lg:border-l border-sakura-200/50 pt-6 lg:pt-0 lg:pl-8">
                    <label class="block text-sm font-semibold text-slate-600 mb-2 pl-1">Buat Email Kustom</label>
                    <div class="flex gap-2 shadow-sm rounded-2xl mb-4">
                        <input type="text" id="custom-name" placeholder="nama" 
                               class="w-[45%] input-soft rounded-l-2xl p-4 text-sm font-medium">
                        <div class="flex items-center px-2 text-sakura-400 font-bold bg-white/50 border-y border-sakura-200">@</div>
                        <select id="domain-select" class="w-[55%] input-soft rounded-r-2xl p-4 text-sm font-medium appearance-none cursor-pointer border-l-0">
                            <option value="jitupasna.online">jitupasna.online</option>
                            <option value="satu.jitupasna.online">satu.jitupasna.online</option>
                            <option value="dua.jitupasna.online">dua.jitupasna.online</option>
                            <option value="tiga.jitupasna.online">tiga.jitupasna.online</option>
                        </select>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="setCustomEmail()" class="flex-1 btn-primary py-3 rounded-xl font-semibold text-sm shadow-md">
                            <i class="fa-solid fa-wand-magic-sparkles mr-2"></i> Terapkan Nama
                        </button>
                        <button onclick="generateRandom()" class="px-5 btn-secondary rounded-xl shadow-sm" title="Acak Email Baru">
                            <i class="fa-solid fa-shuffle"></i>
                        </button>
                    </div>
                </div>

            </div>
        </div>

        <!-- Main Content: Inbox & Reader -->
        <div class="flex flex-col lg:flex-row gap-8 h-[650px]">
            
            <!-- Inbox List -->
            <div class="lg:w-1/3 glass-card flex flex-col overflow-hidden">
                <div class="p-5 border-b border-sakura-100 bg-white/40 flex justify-between items-center backdrop-blur-sm">
                    <h2 class="font-bold text-slate-800 flex items-center gap-2">
                        <div class="w-8 h-8 rounded-full bg-sakura-100 text-sakura-500 flex items-center justify-center">
                            <i class="fa-solid fa-inbox text-sm"></i>
                        </div>
                        Kotak Masuk
                    </h2>
                    
                    <button onclick="manualRefresh()" class="w-8 h-8 rounded-full btn-secondary flex items-center justify-center text-sm" title="Segarkan Data">
                        <i class="fa-solid fa-rotate-right"></i>
                    </button>
                </div>
                
                <div id="inbox-list" class="flex-1 overflow-y-auto p-3 space-y-2">
                    <!-- Placeholder rendered by JS -->
                </div>
            </div>

            <!-- Email Reader -->
            <div class="lg:w-2/3 glass-card flex flex-col overflow-hidden relative">
                <!-- Header -->
                <div id="reader-header" class="p-6 border-b border-sakura-100 bg-white/50 flex justify-between items-start hidden transition-all">
                    <div class="flex-1 overflow-hidden pr-4">
                        <h2 id="view-subject" class="font-bold text-xl mb-1 text-slate-800 truncate">Subject Email</h2>
                        <div class="flex items-center gap-2 text-sm text-slate-500">
                            <span class="font-semibold text-sakura-600 truncate max-w-[250px]" id="view-sender">pengirim@email.com</span>
                            <span class="text-sakura-200">•</span>
                            <span id="view-date" class="text-xs font-medium">10:00</span>
                        </div>
                    </div>
                    <button onclick="deleteCurrentEmail()" class="w-10 h-10 rounded-xl bg-red-50 text-red-500 hover:bg-red-500 hover:text-white border border-red-100 transition-all duration-300 flex items-center justify-center shadow-sm hover:shadow-md" title="Hapus Pesan">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>

                <!-- Body Email Area -->
                <div class="flex-1 relative p-4 md:p-6 bg-slate-50/30">
                    
                    <!-- Empty State Placeholder -->
                    <div id="reader-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-center p-6">
                        <div class="w-24 h-24 bg-sakura-50 rounded-full flex items-center justify-center mb-6 shadow-inner">
                            <i class="fa-regular fa-envelope-open text-4xl text-sakura-300"></i>
                        </div>
                        <h3 class="text-xl font-bold text-slate-700 mb-2">Area Membaca Pesan</h3>
                        <p class="text-slate-500 text-sm max-w-xs leading-relaxed">Pilih salah satu pesan dari kotak masuk di sebelah kiri untuk menampilkan isinya di sini.</p>
                    </div>
                    
                    <!-- Container untuk iframe agar rapi -->
                    <div class="w-full h-full rounded-2xl overflow-hidden border border-sakura-100 bg-white shadow-sm transition-all duration-500 opacity-0 scale-95 pointer-events-none" id="iframe-container">
                        <iframe id="email-body-frame"></iframe>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 translate-y-24 opacity-0 toast-popup px-6 py-4 rounded-2xl z-50 flex items-center gap-4 transition-all duration-500">
        <div id="toast-icon-wrapper" class="w-10 h-10 rounded-full bg-sakura-100 text-sakura-500 flex items-center justify-center shadow-inner">
            <i class="fa-solid fa-check" id="toast-icon"></i>
        </div>
        <div class="flex flex-col">
            <span id="toast-title" class="font-bold text-slate-800 text-sm">Notifikasi</span>
            <span id="toast-msg" class="text-xs text-slate-500 font-medium">Tindakan berhasil dilakukan.</span>
        </div>
    </div>

    <script>
        // --- ANIMASI KELOPAK SAKURA REALISTIS ---
        function createSakura() {
            const container = document.getElementById('sakura-container');
            const petalCount = 20; // Disesuaikan agar elegan dan tidak berat
            for(let i=0; i<petalCount; i++) {
                let petal = document.createElement('div');
                petal.classList.add('petal');
                
                let size = Math.random() * 8 + 6; // 6px - 14px
                let left = Math.random() * 100;
                let duration = Math.random() * 8 + 8; // Lambat (8s - 16s)
                let delay = Math.random() * 10;
                
                petal.style.width = `${size}px`; 
                petal.style.height = `${size}px`;
                petal.style.left = `${left}vw`; 
                petal.style.animationDuration = `${duration}s, ${duration/3}s`;
                petal.style.animationDelay = `${delay}s, 0s`;
                
                container.appendChild(petal);
            }
        }
        createSakura();

        // --- STATE APP ---
        let currentEmailAddress = "";
        let inboxData = [];
        let activeEmailId = null;
        let pollingInterval = null;
        const DOMAINS = ['jitupasna.online', 'satu.jitupasna.online', 'dua.jitupasna.online', 'tiga.jitupasna.online'];
        
        // PENTING: GANTI INI DENGAN URL WORKER CLOUDFLARE ANDA!
        const WORKER_URL = "https://mail.ggteam.workers.dev"; 

        window.onload = () => {
            generateRandom();
            startRealtimeCheck();
        };

        function generateRandom() {
            const randomString = Math.random().toString(36).substring(2, 10);
            const randomDomain = DOMAINS[Math.floor(Math.random() * DOMAINS.length)];
            currentEmailAddress = `${randomString}@${randomDomain}`;
            
            document.getElementById('custom-name').value = randomString;
            document.getElementById('domain-select').value = randomDomain;
            updateUIState();
        }

        function setCustomEmail() {
            const name = document.getElementById('custom-name').value.trim().toLowerCase().replace(/[^a-z0-9.-]/g, '');
            const domain = document.getElementById('domain-select').value;
            if(!name) { showToast("Perhatian", "Silakan ketik nama email terlebih dahulu", true); return; }
            currentEmailAddress = `${name}@${domain}`;
            updateUIState();
        }

        function updateUIState() {
            document.getElementById('current-email').value = currentEmailAddress;
            resetInbox();
            showToast("Email Siap", `Alamat aktif: ${currentEmailAddress}`);
        }

        function copyEmail() {
            const emailInput = document.getElementById('current-email');
            emailInput.select(); emailInput.setSelectionRange(0, 99999);
            try { navigator.clipboard.writeText(emailInput.value); showToast("Berhasil Disalin", "Alamat tersimpan di papan klip"); } 
            catch(e) { document.execCommand('copy'); showToast("Berhasil Disalin", "Alamat disalin"); }
        }

        // --- INBOX LOGIC ---
        function resetInbox() {
            inboxData = [];
            activeEmailId = null;
            renderInbox();
            hideEmailReader();
        }

        function startRealtimeCheck() {
            pollingInterval = setInterval(fetchEmailsFromServer, 5000);
        }

        function manualRefresh() {
            const icon = document.querySelector('.fa-rotate-right');
            icon.classList.add('fa-spin');
            
            fetchEmailsFromServer(true).then(() => {
                setTimeout(() => icon.classList.remove('fa-spin'), 600);
            });
        }

        function setSyncStatus(isSyncing) {
            const standby = document.getElementById('standby-indicator');
            const syncIcon = document.getElementById('sync-icon');
            const statusText = document.getElementById('status-text');

            if(isSyncing) {
                standby.classList.add('hidden');
                syncIcon.classList.remove('hidden');
                statusText.textContent = "Menyinkron...";
                statusText.classList.add('animate-pulse');
            } else {
                syncIcon.classList.add('hidden');
                standby.classList.remove('hidden');
                statusText.textContent = "Terhubung";
                statusText.classList.remove('animate-pulse');
            }
        }

        async function fetchEmailsFromServer(isManual = false) {
            if(!currentEmailAddress || WORKER_URL.includes("MASUKKAN_URL")) {
                if(isManual) showToast("Koneksi Gagal", "Pastikan URL Worker sudah diatur.", true);
                return;
            }
            
            setSyncStatus(true);
            
            try {
                const response = await fetch(`${WORKER_URL}/api/emails?address=${currentEmailAddress}`);
                if (!response.ok) throw new Error("Gagal");
                
                const data = await response.json();
                
                if(data.emails && data.emails.length > inboxData.length) {
                    const diff = data.emails.length - inboxData.length;
                    inboxData = data.emails;
                    renderInbox();
                    showToast("Pesan Baru", `Anda menerima ${diff} pesan baru!`);
                } else if (data.emails) {
                    inboxData = data.emails;
                    renderInbox();
                    if(isManual) showToast("Pembaruan", "Tidak ada pesan baru saat ini.");
                }
            } catch (error) {
                // Silent fail unless manual
                if(isManual) showToast("Koneksi Gagal", "Tidak dapat terhubung ke server.", true);
            } finally {
                setTimeout(() => setSyncStatus(false), 500);
            }
        }

        function renderInbox() {
            const listContainer = document.getElementById('inbox-list');
            
            if (inboxData.length === 0) {
                listContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center text-center p-8 h-full opacity-60">
                        <i class="fa-solid fa-wind text-4xl text-sakura-200 mb-3"></i>
                        <p class="text-sm font-medium text-slate-500">Kotak masuk kosong</p>
                    </div>`;
                return;
            }

            let html = '';
            inboxData.forEach(email => {
                const isActive = email.id === activeEmailId ? 'active' : '';
                
                html += `
                    <div onclick="viewEmail('${email.id}')" class="inbox-item cursor-pointer p-4 rounded-xl bg-white border border-slate-100 shadow-sm ${isActive}">
                        <div class="flex justify-between items-start mb-1.5 gap-2">
                            <h3 class="font-bold text-sm text-slate-800 truncate">${email.sender}</h3>
                            <span class="text-[10px] font-semibold text-sakura-500 bg-sakura-50 px-2 py-0.5 rounded-md whitespace-nowrap">${email.date}</span>
                        </div>
                        <p class="text-xs text-slate-500 truncate font-medium">${email.subject}</p>
                    </div>
                `;
            });
            listContainer.innerHTML = html;
        }

        function viewEmail(id) {
            activeEmailId = id;
            renderInbox(); 
            const email = inboxData.find(e => e.id === id);
            if(!email) return;

            document.getElementById('view-subject').textContent = email.subject;
            document.getElementById('view-sender').textContent = email.sender;
            document.getElementById('view-date').textContent = email.date;
            
            document.getElementById('reader-header').classList.remove('hidden');
            document.getElementById('reader-placeholder').classList.add('hidden');
            
            const iframeContainer = document.getElementById('iframe-container');
            const iframe = document.getElementById('email-body-frame');
            
            // Efek Smooth tampil iframe
            iframeContainer.classList.remove('opacity-0', 'scale-95', 'pointer-events-none');
            iframeContainer.classList.add('opacity-100', 'scale-100');
            
            iframe.srcdoc = email.bodyHtml || email.bodyText || "<div style='font-family:sans-serif; text-align:center; padding: 40px; color: #888;'>Isi email tidak terbaca.</div>";
        }

        function hideEmailReader() {
            document.getElementById('reader-header').classList.add('hidden');
            document.getElementById('reader-placeholder').classList.remove('hidden');
            
            const iframeContainer = document.getElementById('iframe-container');
            const iframe = document.getElementById('email-body-frame');
            
            // Efek Smooth tutup iframe
            iframeContainer.classList.remove('opacity-100', 'scale-100');
            iframeContainer.classList.add('opacity-0', 'scale-95', 'pointer-events-none');
            
            setTimeout(() => { iframe.srcdoc = ""; }, 300);
        }

        function deleteCurrentEmail() {
            if(!activeEmailId) return;
            inboxData = inboxData.filter(e => e.id !== activeEmailId);
            showToast("Dihapus", "Pesan telah berhasil dihapus");
            activeEmailId = null;
            renderInbox();
            hideEmailReader();
        }

        // --- TOAST NOTIFICATION MODERN ---
        function showToast(title, message, isError = false) {
            const toast = document.getElementById('toast');
            const titleEl = document.getElementById('toast-title');
            const msgEl = document.getElementById('toast-msg');
            const iconWrapper = document.getElementById('toast-icon-wrapper');
            const icon = document.getElementById('toast-icon');
            
            titleEl.textContent = title;
            msgEl.textContent = message;
            
            if(isError) {
                iconWrapper.className = "w-10 h-10 rounded-full bg-red-100 text-red-500 flex items-center justify-center shadow-inner";
                icon.className = "fa-solid fa-triangle-exclamation";
                toast.style.borderColor = "rgba(239, 68, 68, 0.3)";
            } else {
                iconWrapper.className = "w-10 h-10 rounded-full bg-sakura-100 text-sakura-500 flex items-center justify-center shadow-inner";
                icon.className = "fa-solid fa-check";
                toast.style.borderColor = "rgba(254, 163, 182, 0.4)";
            }
            
            // Tampil dari bawah tengah
            toast.classList.remove('translate-y-24', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            setTimeout(() => { 
                toast.classList.add('translate-y-24', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }
    </script>
</body>
</html>
